services:
  postgres:
    image: postgres:latest
    container_name: swiftqueue-db
    environment:
      POSTGRES_DB: swiftqueue_db
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    ports:
      - "5445:5432"
    volumes:
      - swiftqueue_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME} -d swiftqueue_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  swiftqueue_data: